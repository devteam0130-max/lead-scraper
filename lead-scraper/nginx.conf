server {
    listen 80;
    listen [::]:80;

    # Substitua pelo seu domínio ou IP após o deploy
    # Exemplo: server_name meudominio.com www.meudominio.com;
    server_name _;

    root /var/www/lead-scraper/frontend/dist;
    index index.html;

    # -------------------------------------------------------
    # Proxy para a API FastAPI (backend na porta 8000)
    # -------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers padrão de proxy
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Configurações essenciais para SSE (Server-Sent Events)
        # Sem isso o Nginx fica bufferizando as respostas e o SSE não funciona
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       300s;   # Timeout longo para scraping demorado
        proxy_connect_timeout    30s;
        proxy_send_timeout       60s;

        # Manter conexão viva para SSE
        proxy_set_header   Connection "";
        chunked_transfer_encoding on;
    }

    # -------------------------------------------------------
    # Frontend React (SPA — redireciona tudo para index.html)
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # Cache de assets estáticos gerados pelo Vite (hash no nome)
        location ~* \.(js|css|woff2?|ico|png|svg|jpg|jpeg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------
    # Segurança básica
    # -------------------------------------------------------
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Ocultar versão do Nginx
    server_tokens off;

    # Limite de tamanho de upload (não é crítico aqui, mas boa prática)
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/lead-scraper.access.log;
    error_log  /var/log/nginx/lead-scraper.error.log;
}
